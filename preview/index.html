<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lavero — Section Preview</title>

  <!-- Token + primitive layer (always loaded) -->
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/home.css">
  <link rel="stylesheet" href="../css/home-sections.css">
  <link rel="stylesheet" href="../css/components/main-menu.css">
  <link rel="stylesheet" href="../css/components/footer.css">

  <!-- Per-section stylesheets — all loaded; only the chosen section renders -->
  <link rel="stylesheet" href="../css/sections/home-hero.css">
  <link rel="stylesheet" href="../css/sections/home-what-you-feel.css">
  <link rel="stylesheet" href="../css/sections/home-product.css">
  <link rel="stylesheet" href="../css/sections/home-replace-90.css">
  <link rel="stylesheet" href="../css/sections/home-routine-proof.css">
  <link rel="stylesheet" href="../css/sections/home-install-ease.css">
  <link rel="stylesheet" href="../css/sections/home-comparison.css">
  <link rel="stylesheet" href="../css/sections/home-fair-question.css">
  <link rel="stylesheet" href="../css/sections/home-community.css">
  <link rel="stylesheet" href="../css/sections/home-the-offer.css">
  <link rel="stylesheet" href="../css/sections/home-faq.css">
  <link rel="stylesheet" href="../css/sections/home-final-cta.css">

  <style>
    /* Preview chrome — not part of the site design system */
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; background: #1a1a1a; font-family: system-ui, sans-serif; }

    #preview-bar {
      position: sticky; top: 0; z-index: 9999;
      background: #111; color: #e0e0e0;
      padding: 0.6rem 1.2rem;
      display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;
      border-bottom: 1px solid #333; font-size: 0.8rem;
    }
    #preview-bar strong { color: #c99a5d; letter-spacing: 0.06em; }
    #preview-bar select, #preview-bar input {
      background: #222; color: #e0e0e0; border: 1px solid #444;
      border-radius: 4px; padding: 0.3rem 0.5rem; font-size: 0.8rem;
    }
    #preview-bar label { display: flex; align-items: center; gap: 0.4rem; }
    #preview-frame-wrap {
      margin: 1rem auto; transition: max-width 0.2s ease;
      background: white; box-shadow: 0 0 0 1px #333;
    }
    #preview-section { display: block; }
    #no-section {
      padding: 4rem 2rem; text-align: center; color: #666; font-size: 1rem;
    }
  </style>
</head>
<body>

<div id="preview-bar">
  <strong>LAVERO</strong> Section Preview

  <label>
    Section:
    <select id="section-picker">
      <option value="">— pick a section —</option>
      <option value="hero">Hero</option>
      <option value="what-you-feel">What You Feel</option>
      <option value="product">Product / Filtration</option>
      <option value="replace-90">Replace Every 90 Days</option>
      <option value="routine-proof">Same Routine Results</option>
      <option value="install-ease">Easy to Put On</option>
      <option value="comparison">Why It's Different</option>
      <option value="fair-question">A Fair Question</option>
      <option value="community">From the Community</option>
      <option value="the-offer">The Offer / Pricing</option>
      <option value="faq">Common Questions</option>
      <option value="final-cta">Final CTA</option>
    </select>
  </label>

  <label>
    Width:
    <select id="width-picker">
      <option value="100%">Full width</option>
      <option value="1440px">1440px</option>
      <option value="1024px">1024px</option>
      <option value="768px">768px</option>
      <option value="390px" selected>390px (mobile)</option>
    </select>
  </label>

  <label>
    <input type="checkbox" id="show-grid"> Grid overlay
  </label>

  <span id="preview-dims" style="color:#888; margin-left:auto;"></span>
</div>

<div id="preview-frame-wrap">
  <div id="no-section">Pick a section above to preview it in isolation.</div>
  <div id="preview-section" style="display:none;"></div>
</div>

<!-- Sections markup — each in its own template element -->
<!-- Rendered into #preview-section when selected via JS. -->

<template id="tpl-hero">
  <!-- Hero markup from index.html -->
  <section class="hero reveal-page is-visible" id="shop">
    <img class="hero-video" src="../assets/curl-woman-showering.jpeg"
         alt="Woman with curly hair enjoying the Lavero shower experience">
    <div class="hero-copy">
      <h1>You were doing everything right</h1>
      <p class="hero-subclaim">Filtering your water was the step you skipped</p>
    </div>
    <p class="hero-rating-proof">
      Loved by thousands
      <span class="stars" aria-label="5 out of 5 stars">★★★★★</span>
    </p>
  </section>
</template>

<template id="tpl-what-you-feel">
  <section class="section section--cream reveal-page is-visible sound-like-you">
    <div class="container two-col sound-like-you-grid">
      <figure class="sound-like-you-img">
        <img src="../assets/curls-in-mirror.jpeg" alt="Woman examining her curls in a bathroom mirror">
      </figure>
      <div class="sound-like-you__text">
        <h2 class="sound-like-you__title">Sounds like <em>you?</em></h2>
        <div class="sound-like-you__list">
          <p class="sound-like-you__line">Some people notice it after a move, and they can't say why.</p>
          <p class="sound-like-you__line">Others watch the colour they paid for fade in a couple of weeks.</p>
          <p class="sound-like-you__line">But it's the same cause: <strong>the chlorine in your shower water.</strong></p>
        </div>
      </div>
    </div>
  </section>
</template>

<template id="tpl-install-ease">
  <section class="section section--sand reveal-page is-visible install-ease">
    <div class="container two-col install-ease__grid">
      <figure class="install-ease__img">
        <img src="../assets/Install-ease-image.jpeg" alt="Hands screwing the Lavero shower head onto the shower arm">
      </figure>
      <div class="install-ease__text">
        <h2 class="install-ease__title"><em>Easy to put on.</em><br>Hard to go back.</h2>
        <ul class="install-ease__list">
          <li class="install-ease__item">
            <span class="install-ease__icon">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="21" height="21" fill="none"
                   stroke="var(--gold)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
              </svg>
            </span>
            <div class="install-ease__copy">
              <p class="install-ease__label">Screws on in less than 60 seconds</p>
              <p class="install-ease__sub">No tools needed. No mess. Just twist.</p>
            </div>
          </li>
          <li class="install-ease__item">
            <span class="install-ease__icon">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="21" height="21" fill="none"
                   stroke="var(--gold)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/>
              </svg>
            </span>
            <div class="install-ease__copy">
              <p class="install-ease__label">Stronger pressure, better-feeling water</p>
              <p class="install-ease__sub">Purified flow your hair and skin will notice.</p>
            </div>
          </li>
        </ul>
      </div>
    </div>
  </section>
</template>

<template id="tpl-replace-90">
  <section class="section section--cream reveal-page is-visible c-d replace-90-section">
    <div class="section-inner">
      <p class="eyebrow">Replace Every 90 Days</p>
      <h2>Filter after 3 months.<br><em>This is what it absorbed.</em></h2>
      <p class="replace-90__body">The filter pulls chlorine, heavy metals, sediment, and organic compounds out of your water.</p>
      <div style="background:var(--sand);border-radius:12px;height:200px;display:flex;align-items:center;justify-content:center;color:var(--taupe);font-size:0.9rem;">[Filter comparison slider — requires JS]</div>
    </div>
  </section>
</template>

<template id="tpl-comparison">
  <section class="section--cream reveal-page is-visible c-d comparison-section comparison" style="padding:clamp(2.5rem,4vw,3.5rem) 4.5vw clamp(2rem,3.5vw,3rem);">
    <div class="section-inner">
      <p class="eyebrow">Why It's Different</p>
      <h2 class="comparison-title">Not all shower filters do the same thing</h2>
      <div class="comparison-desktop-wrap">
        <div class="comparison-table-shell comparison-desktop-only">
          <div class="comparison-col-labels" aria-hidden="true">
            <div></div>
            <div class="comparison-col-head comparison-col-head--other">Most shower filters</div>
            <div class="comparison-col-head comparison-col-head--lavero">★ Lavero</div>
          </div>
          <table class="comparison-table" aria-label="Lavero vs standard filters">
            <colgroup><col><col><col></colgroup>
            <tbody>
              <tr><th scope="row">Designed around</th><td>cleaner water, "in general"</td><td>the chlorine that strips your hair</td></tr>
              <tr><th scope="row">Filtration</th><td>basic carbon</td><td>four stages, built for hair and skin</td></tr>
              <tr><th scope="row">Lifespan</th><td>clogs up and gets stuck</td><td>lasts 90 days, changes in seconds</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </section>
</template>

<template id="tpl-fair-question">
  <section class="section--cream reveal-page is-visible c-d fair-question">
    <h2 class="fair-question__title">"Wait — can't I just find something cheaper on Amazon?"</h2>
    <p class="fair-question__lead">Fair question. Here's the <span class="accent">honest</span> answer.</p>
    <div class="section-inner fair-question__inner">
      <div class="fair-question__card">
        <div class="fair-question__body-wrap">
          <p class="fair-question__body">Most filters you'll find there come out of the same 3–4 factories. No independent testing. No filtration standard built around hair chemistry.</p>
        </div>
        <div class="fair-question__kicker-wrap">
          <p class="fair-question__kicker">That's not a cheaper decision. That's a delayed one.</p>
        </div>
      </div>
    </div>
  </section>
</template>

<template id="tpl-final-cta">
  <section class="section--sand reveal-page is-visible final-cta">
    <div class="final-cta__watermark-wrap">
      <span class="final-cta-watermark">LAVERO</span>
    </div>
    <div class="section-inner final-cta__inner">
      <p class="final-cta__eyebrow">Lavero · The Step Before Everything</p>
      <h2 class="final-cta__title">Your routine was never the problem.</h2>
      <h2 class="final-cta__title final-cta__title--accent"><em>Fix the one thing that was.</em></h2>
      <p class="final-cta__body">You already have the products. Lavero changes the water those products land on — and nothing else.</p>
      <a href="../product.html" class="button final-cta__button">Get Lavero — $139</a>
      <p class="final-cta__note">60-day money-back guarantee · No subscription</p>
    </div>
  </section>
</template>

<!-- Sections that require live JS (product, routine-proof, faq, community, the-offer)
     are linked to the full page rather than inlined here. -->
<template id="tpl-product">
  <div style="padding:2rem;text-align:center;color:var(--taupe);background:var(--cream);">
    <p>The product/filtration section requires its JS interaction.<br>
    <a href="../index.html#shop" style="color:var(--gold);">View in full page →</a></p>
  </div>
</template>

<template id="tpl-routine-proof">
  <div style="padding:2rem;text-align:center;color:var(--taupe);background:var(--sand);">
    <p>The results carousel requires JS.<br>
    <a href="../index.html" style="color:var(--gold);">View in full page →</a></p>
  </div>
</template>

<template id="tpl-community">
  <div style="padding:2rem;text-align:center;color:var(--taupe);background:var(--cream);">
    <p>Community stats + testimonials — best viewed in full page context.<br>
    <a href="../index.html" style="color:var(--gold);">View in full page →</a></p>
  </div>
</template>

<template id="tpl-the-offer">
  <div style="padding:2rem;text-align:center;color:var(--taupe);background:var(--sand);">
    <p>Pricing card — best viewed in full page context.<br>
    <a href="../index.html" style="color:var(--gold);">View in full page →</a></p>
  </div>
</template>

<template id="tpl-faq">
  <section class="section section--cream reveal-page is-visible faq">
    <div class="section-inner">
      <p class="eyebrow">Common Questions</p>
    </div>
    <div class="section-inner r-grid-2 faq__grid">
      <div class="faq-intro"><h2>The questions the community has.</h2></div>
      <div id="faq-list">
        <div class="faq-item">
          <button class="faq-q" aria-expanded="false">I rent. Does this work in my apartment?<span class="faq-icon">+</span></button>
          <div class="faq-a"><p>Yes. Lavero hand-tightens directly onto your existing showerhead fitting — no tools, no drilling.</p></div>
        </div>
        <div class="faq-item">
          <button class="faq-q" aria-expanded="false">Does this fix hard water or remove minerals?<span class="faq-icon">+</span></button>
          <div class="faq-a"><p><strong>No — and that distinction matters.</strong> Lavero removes chlorine and organic compounds, not calcium/magnesium.</p></div>
        </div>
      </div>
    </div>
  </section>
</template>

<script>
  const picker  = document.getElementById('section-picker');
  const wPicker = document.getElementById('width-picker');
  const wrap    = document.getElementById('preview-frame-wrap');
  const section = document.getElementById('preview-section');
  const noSect  = document.getElementById('no-section');
  const dims    = document.getElementById('preview-dims');
  const gridCB  = document.getElementById('show-grid');

  function update() {
    const key = picker.value;
    const w = wPicker.value;
    wrap.style.maxWidth = w;
    dims.textContent = w === '100%' ? 'full width' : w;

    if (!key) { noSect.style.display=''; section.style.display='none'; section.innerHTML=''; return; }
    const tpl = document.getElementById('tpl-'+key);
    section.style.display = '';
    noSect.style.display = 'none';
    section.innerHTML = tpl ? tpl.innerHTML : '<p style="padding:2rem;color:red;">Template not found</p>';

    // re-attach FAQ accordion if rendered
    section.querySelectorAll('.faq-item').forEach(item => {
      const btn = item.querySelector('.faq-q');
      const ans = item.querySelector('.faq-a');
      const icon = item.querySelector('.faq-icon');
      if (!btn) return;
      btn.addEventListener('click', () => {
        const isOpen = ans.style.display === 'block';
        ans.style.display = isOpen ? 'none' : 'block';
        icon.textContent = isOpen ? '+' : '×';
        btn.setAttribute('aria-expanded', String(!isOpen));
      });
    });
  }

  function toggleGrid(on) {
    let s = document.getElementById('grid-overlay-style');
    if (on && !s) {
      s = document.createElement('style');
      s.id = 'grid-overlay-style';
      s.textContent = `
        #preview-section * { outline: 1px solid rgba(201,154,93,0.25) !important; }
        #preview-section .container, #preview-section .section-inner { outline: 2px dashed rgba(201,154,93,0.5) !important; }
      `;
      document.head.appendChild(s);
    } else if (!on && s) s.remove();
  }

  picker.addEventListener('change', update);
  wPicker.addEventListener('change', update);
  gridCB.addEventListener('change', e => toggleGrid(e.target.checked));

  // Set default to 390px / first section
  update();
</script>
</body>
</html>
